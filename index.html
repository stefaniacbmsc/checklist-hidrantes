<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist Hidrantes</title>
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-900 text-white">

    <div id="root">
        <div class="flex h-screen items-center justify-center text-slate-400">
            Carregando sistema...
        </div>
    </div>

    <script type="text/babel">
        try {
            const { useState } = React;

            const HYDRANTS = [
                { id: 1, address: "Rua Antônio Joaquim Tavares, 942, Centro" },
                { id: 2, address: "Rua Inácio Francisco de Souza, Armação" },
                { id: 3, address: "Rua José Domiciliano Pereira, Armação" },
                { id: 4, address: "Av. Nereu Ramos, 889, Centro" },
                { id: 5, address: "Av. Nereu Ramos, Posto Delta" },
                { id: 6, address: "Rua Marciano Luiz Bento, Gravatá" },
                { id: 7, address: "Rua Inacio Jacinto Albano, 2233, Armação" }
            ];

            function App() {
                const [step, setStep] = useState('home');
                const [idx, setIdx] = useState(0);

                return (
                    <div className="p-6 max-w-lg mx-auto">
                        <h1 className="text-xl font-bold text-red-500 mb-6 text-center">Checklist Hidrantes</h1>
                        
                        {step === 'home' && (
                            <button onClick={() => setStep('checklist')} className="w-full bg-red-600 p-6 rounded-xl font-bold">
                                Iniciar Vistoria
                            </button>
                        )}

                        {step === 'checklist' && (
                            <div className="space-y-4">
                                <p className="text-sm text-slate-400">Hidrante {idx + 1}/7</p>
                                <p className="font-bold text-lg">{HYDRANTS[idx].address}</p>
                                
                                <div className="grid grid-cols-2 gap-2">
                                    <button className="bg-green-600 p-4 rounded">OPERANTE</button>
                                    <button className="bg-red-600 p-4 rounded">PROBLEMA</button>
                                </div>
                                
                                <button onClick={() => setIdx(Math.min(6, idx + 1))} className="w-full bg-slate-700 p-3 rounded mt-4">Próximo</button>
                            </div>
                        )}
                    </div>
                );
            }

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);

        } catch (err) {
            document.getElementById('root').innerHTML = `<div class="p-10 text-red-500">Erro crítico: ${err.message}</div>`;
            console.error(err);
        }
    </script>
</body>
</html>
