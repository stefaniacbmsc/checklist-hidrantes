<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vistoria de Hidrantes - Penha</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script>
        (function(){ emailjs.init("L_pUEcfq0dD7rcw5p"); })();
    </script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-4">

    <div class="max-w-md mx-auto">
        <!-- Cabeçalho com o Hidrante -->
        <div class="flex items-center gap-4 bg-slate-900 p-4 rounded-xl border border-red-900 mb-6">
            <svg class="w-12 h-12 text-red-600" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 2c-3.87 0-7 3.13-7 7v2H4v2h2v7h12v-7h2v-2h-1V9c0-3.87-3.13-7-7-7zm0 2c2.76 0 5 2.24 5 5v2H7V9c0-2.76 2.24-5 5-5zM9 13h6v6H9v-6z"/>
            </svg>
            <h1 class="text-xl font-bold text-red-500 leading-tight">Vistoria de Hidrantes<br><span class="text-slate-300">Penha - SC</span></h1>
        </div>

        <!-- Histórico -->
        <div id="history-box" class="bg-slate-900 p-4 rounded-lg border border-slate-800 mb-6 hidden">
            <p class="text-xs text-slate-500 uppercase tracking-wider mb-1">Último Vistoriador:</p>
            <p id="last-inspector-name" class="font-bold text-white text-lg"></p>
        </div>

        <div id="app">
            <label class="block text-sm mb-2 text-slate-400">Nome do Bombeiro (Obrigatório)</label>
            <input id="nameInput" type="text" placeholder="Ex: SD BM Silva" class="w-full p-4 bg-slate-900 rounded-lg mb-6 border border-slate-700 text-white outline-none focus:border-red-500">
            <button onclick="startVistoria()" class="w-full bg-red-600 p-4 rounded-lg font-bold hover:bg-red-700 transition shadow-lg shadow-red-900/20">Iniciar Vistoria</button>
        </div>
    </div>

    <script>
        window.onload = function() {
            const last = localStorage.getItem('lastInspector');
            if(last) {
                document.getElementById('history-box').classList.remove('hidden');
                document.getElementById('last-inspector-name').innerText = last;
            }
        };

        const HYDRANTS = [
            "Rua Antônio Joaquim Tavares, 942, Centro (Próx. ao Ginásio)",
            "Rua Inácio Francisco de Souza (Próx. Pousada Suite 8 - Beto Carrero)",
            "Rua José Domiciliano Pereira (Av. Itapocoroi - Abastecimento usual)",
            "Av. Nereu Ramos, 889 (Ao lado da Prefeitura)",
            "Av. Nereu Ramos (Em frente ao Posto Delta)",
            "Rua Marciano Luiz Bento, Gravatá (Asilo)",
            "Rua Inacio Jacinto Albano, 2233, Armação (Em frente Villa Park Chalés)"
        ];

        let state = {
            inspectorName: '',
            results: HYDRANTS.map(() => ({ status: 'OPERANTE', obs: '' })),
            currentIdx: 0
        };

        function startVistoria() {
            const name = document.getElementById('nameInput').value;
            if(!name) return alert("Por favor, informe seu nome.");
            state.inspectorName = name;
            renderChecklist();
        }

        function renderChecklist() {
            const app = document.getElementById('app');
            const address = HYDRANTS[state.currentIdx];
            const res = state.results[state.currentIdx];
            
            app.innerHTML = `
                <div class="bg-slate-900 p-6 rounded-xl border border-slate-800">
                    <h2 class="text-sm text-slate-500 mb-1 font-bold uppercase">Hidrante ${state.currentIdx + 1} de 7</h2>
                    <p class="text-lg font-bold text-white mb-6">${address}</p>
                    
                    <div class="flex gap-3 mb-6">
                        <button onclick="updateStatus('OPERANTE')" class="flex-1 p-4 rounded-lg font-bold ${res.status === 'OPERANTE' ? 'bg-green-700' : 'bg-slate-800'}">OPERANTE</button>
                        <button onclick="updateStatus('PROBLEMA')" class="flex-1 p-4 rounded-lg font-bold ${res.status === 'PROBLEMA' ? 'bg-red-700' : 'bg-slate-800'}">PROBLEMA</button>
                    </div>

                    ${res.status === 'PROBLEMA' ? `
                        <textarea id="obsInput" onchange="state.results[state.currentIdx].obs = this.value" class="w-full p-4 bg-slate-950 rounded-lg mb-6 border border-slate-700 text-white" placeholder="Justifique o problema (Ex: Sem água, não abre)...">${res.obs}</textarea>
                    ` : ''}

                    <div class="flex justify-between gap-2">
                        <button onclick="changeIdx(-1)" class="flex-1 bg-slate-800 p-3 rounded-lg">Voltar</button>
                        ${state.currentIdx < 6 
                            ? `<button onclick="changeIdx(1)" class="flex-1 bg-slate-700 p-3 rounded-lg font-bold">Próximo</button>`
                            : `<button onclick="sendReport()" class="flex-1 bg-blue-600 p-3 rounded-lg font-bold shadow-lg shadow-blue-900/20">Enviar Relatório</button>`}
                    </div>
                </div>
            `;
        }

        function updateStatus(status) {
            state.results[state.currentIdx].status = status;
            renderChecklist();
        }

        function changeIdx(dir) {
            if(state.results[state.currentIdx].status === 'PROBLEMA' && !state.results[state.currentIdx].obs) {
                return alert("Por favor, descreva o problema deste hidrante.");
            }
            state.currentIdx = Math.max(0, Math.min(6, state.currentIdx + dir));
            renderChecklist();
        }

        function sendReport() {
            // Formata o detalhamento para o e-mail com tag de destaque
            const details = state.results.map((r, i) => {
                const statusTag = r.status === 'PROBLEMA' ? ' [!!! PROBLEMA !!!]' : ' [OPERANTE]';
                return `${HYDRANTS[i]}: ${statusTag} ${r.obs ? '- ' + r.obs : ''}`;
            }).join("\n");
            
            const templateParams = {
                to_email: "7221cmt@cbm.sc.gov.br",
                firefighter_name: state.inspectorName,
                date: new Date().toLocaleDateString('pt-BR'),
                details: details,
                status: state.results.some(r => r.status === 'PROBLEMA') ? "Com Problemas" : "Tudo Operante"
            };

            emailjs.send('Servico_CBMSC', 'template_0s9pade', templateParams)
                .then(() => {
                    localStorage.setItem('lastInspector', state.inspectorName);
                    alert("Relatório enviado! Muito obrigado pela colaboração com a segurança de Penha.");
                    location.reload(); 
                })
                .catch((err) => {
                    console.error(err);
                    alert("Erro ao enviar. Verifique a internet.");
                });
        }
    </script>
</body>
</html>
