<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist Hidrantes CBMSC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;
        const HYDRANTS = [
            { id: 1, address: "Rua Antônio Joaquim Tavares, 942", neighborhood: "Centro" },
            { id: 2, address: "Rua Inácio Francisco de Souza", neighborhood: "Armação (Beto Carrero)" },
            { id: 3, address: "Rua José Domiciliano Pereira", neighborhood: "Armação" },
            { id: 4, address: "Av. Nereu Ramos, 889", neighborhood: "Centro (Prefeitura)" },
            { id: 5, address: "Av. Nereu Ramos", neighborhood: "Centro/Armação (Posto Delta)" },
            { id: 6, address: "Rua Marciano Luiz Bento", neighborhood: "Gravatá (Asilo)" },
            { id: 7, address: "Rua Inacio Jacinto Albano, 2233", neighborhood: "Armação (Villa Park)" }
        ];

        function App() {
            const [step, setStep] = useState('home');
            const [firefighter, setFirefighter] = useState({ name: "", rank: "SD BM" });
            const [checklist, setChecklist] = useState(HYDRANTS.map(h => ({ ...h, status: 'OK', obs: '' })));
            const [currentIdx, setCurrentIdx] = useState(0);
            const [sending, setSending] = useState(false);

            const updateStatus = (status, obs) => {
                const next = [...checklist];
                next[currentIdx].status = status;
                next[currentIdx].obs = obs;
                setChecklist(next);
            };

            const sendEmail = () => {
                setSending(true);
                const issues = checklist.filter(h => h.status !== 'OK');
                const templateParams = {
                    firefighter_name: `${firefighter.rank} ${firefighter.name}`,
                    details: issues.length > 0 ? issues.map(i => `${i.address}: ${i.obs}`).join(" | ") : "Nenhuma alteração encontrada.",
                    status: issues.length > 0 ? "Com Alterações" : "Sem Alterações"
                };

                emailjs.init("L_pUEcfq0dD7rcw5p");
                emailjs.send('Servico_CBMSC', 'template_0s9pade', templateParams)
                    .then(() => {
                        alert("Relatório enviado!");
                        setStep('home');
                        setSending(false);
                    })
                    .catch(() => {
                        alert("Erro ao enviar. Verifique a conexão.");
                        setSending(false);
                    });
            };

            return (
                <div className="min-h-screen p-4">
                    {step === 'home' && (
                        <div className="max-w-md mx-auto space-y-6 mt-10">
                            <h1 className="text-2xl font-bold text-red-500 text-center">Vistoria de Hidrantes</h1>
                            <input className="w-full p-3 bg-slate-800 rounded border border-slate-700 text-white" placeholder="Nome do Bombeiro" onChange={(e) => setFirefighter({...firefighter, name: e.target.value})} />
                            <button onClick={() => setStep('checklist')} className="w-full bg-red-600 p-4 rounded font-bold text-white">Iniciar Vistoria</button>
                        </div>
                    )}

                    {step === 'checklist' && (
                        <div className="max-w-md mx-auto bg-slate-800 p-6 rounded-lg text-white">
                            <h2 className="text-xl font-bold mb-4">Hidrante {currentIdx + 1}/7</h2>
                            <p className="text-slate-400 mb-2">{checklist[currentIdx].address}</p>
                            <div className="flex gap-2 mb-4">
                                <button onClick={() => updateStatus('OK', '')} className={`flex-1 p-2 rounded ${checklist[currentIdx].status === 'OK' ? 'bg-green-600' : 'bg-slate-700'}`}>OK</button>
                                <button onClick={() => updateStatus('Problema', checklist[currentIdx].obs)} className={`flex-1 p-2 rounded ${checklist[currentIdx].status !== 'OK' ? 'bg-red-600' : 'bg-slate-700'}`}>Problema</button>
                            </div>
                            {checklist[currentIdx].status !== 'OK' && (
                                <textarea className="w-full p-2 bg-slate-900 rounded mb-4 text-white" placeholder="Detalhes..." onChange={(e) => updateStatus('Problema', e.target.value)} />
                            )}
                            <div className="flex justify-between mt-4">
                                <button onClick={() => setCurrentIdx(Math.max(0, currentIdx - 1))} className="bg-slate-700 px-4 py-2 rounded">Voltar</button>
                                {currentIdx < 6 ? <button onClick={() => setCurrentIdx(currentIdx + 1)} className="bg-slate-700 px-4 py-2 rounded">Próximo</button> : <button onClick={() => setStep('summary')} className="bg-blue-600 px-4 py-2 rounded">Finalizar</button>}
                            </div>
                        </div>
                    )}

                    {step === 'summary' && (
                        <div className="max-w-md mx-auto space-y-4 mt-10">
                            <h2 className="text-xl font-bold text-center">Resumo da Vistoria</h2>
                            <button onClick={sendEmail} disabled={sending} className="w-full bg-red-600 p-4 rounded font-bold text-white">
                                {sending ? "Enviando..." : "Transmitir Relatório ao Comando"}
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
