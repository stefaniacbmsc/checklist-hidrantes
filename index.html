<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist Hidrantes CBMSC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">
    <div id="app" class="max-w-md mx-auto p-4"></div>

    <script>
        emailjs.init("L_pUEcfq0dD7rcw5p");

        const HYDRANTS = [
            "Rua Antônio Joaquim Tavares, 942, Centro",
            "Rua Inácio Francisco de Souza, Armação",
            "Rua José Domiciliano Pereira, Armação",
            "Av. Nereu Ramos, 889, Centro",
            "Av. Nereu Ramos, Posto Delta",
            "Rua Marciano Luiz Bento, Gravatá",
            "Rua Inacio Jacinto Albano, 2233, Armação"
        ];

        let state = {
            step: 'home',
            inspectorName: localStorage.getItem('lastInspectorName') || '',
            results: HYDRANTS.map(() => ({ status: 'OK', obs: '', photo: null })),
            currentIdx: 0
        };

        function render() {
            const app = document.getElementById('app');
            if (state.step === 'home') {
                app.innerHTML = `
                    <h1 class="text-2xl font-bold text-red-500 text-center mb-6">Vistoria de Hidrantes</h1>
                    <div class="bg-slate-800 p-4 rounded-lg mb-6">
                        <p class="text-sm">Último inspetor: ${localStorage.getItem('lastInspectorName') || 'Nenhum'}</p>
                    </div>
                    <input id="name" type="text" value="${state.inspectorName}" placeholder="Nome do Bombeiro" class="w-full p-3 bg-slate-800 rounded mb-4 text-white border border-slate-700" onchange="state.inspectorName = this.value">
                    <button onclick="state.step='checklist'; render()" class="w-full bg-red-600 p-4 rounded font-bold">Iniciar Vistoria</button>
                `;
            } else {
                const item = HYDRANTS[state.currentIdx];
                const res = state.results[state.currentIdx];
                app.innerHTML = `
                    <h2 class="text-xl font-bold mb-4">Hidrante ${state.currentIdx + 1}/7</h2>
                    <p class="mb-4">${item}</p>
                    <div class="flex gap-2 mb-4">
                        <button onclick="updateStatus('OK')" class="flex-1 p-3 rounded ${res.status === 'OK' ? 'bg-green-600' : 'bg-slate-700'}">OK</button>
                        <button onclick="updateStatus('Problema')" class="flex-1 p-3 rounded ${res.status !== 'OK' ? 'bg-red-600' : 'bg-slate-700'}">Problema</button>
                    </div>
                    ${res.status !== 'OK' ? `<textarea onchange="state.results[state.currentIdx].obs = this.value" class="w-full p-3 bg-slate-800 rounded mb-4" placeholder="Justificativa...">${res.obs}</textarea>` : ''}
                    <div class="flex justify-between mt-4">
                        <button onclick="state.currentIdx = Math.max(0, state.currentIdx - 1); render()" class="bg-slate-700 px-4 py-2 rounded">Voltar</button>
                        ${state.currentIdx < 6 ? 
                            `<button onclick="state.currentIdx++; render()" class="bg-slate-700 px-4 py-2 rounded">Próximo</button>` : 
                            `<button onclick="sendReport()" class="bg-blue-600 px-4 py-2 rounded">Enviar Relatório</button>`}
                    </div>
                `;
            }
        }

        function updateStatus(status) {
            state.results[state.currentIdx].status = status;
            render();
        }

        function sendReport() {
            localStorage.setItem('lastInspectorName', state.inspectorName);
            const templateParams = {
                firefighter_name: state.inspectorName,
                date: new Date().toLocaleDateString(),
                details: state.results.map((r, i) => `${HYDRANTS[i]}: ${r.status} ${r.obs}`).join(" | "),
                status: "Finalizado"
            };
            emailjs.send('Servico_CBMSC', 'template_0s9pade', templateParams)
                .then(() => { alert("Enviado!"); location.reload(); })
                .catch(() => alert("Erro ao enviar."));
        }

        render();
    </script>
</body>
</html>
